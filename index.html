<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurora FC | Loading</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(0, 255, 200, 0.18), transparent 35%),
        radial-gradient(circle at top right, rgba(0, 180, 255, 0.18), transparent 35%),
        radial-gradient(circle at bottom center, rgba(0, 100, 255, 0.18), transparent 40%),
        linear-gradient(160deg, #05070d 0%, #0c1220 45%, #081018 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Aurora animated background */
    .aurora {
      position: absolute;
      inset: -20%;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(0, 255, 170, 0.18), transparent 30%),
        radial-gradient(ellipse at 80% 20%, rgba(0, 174, 255, 0.18), transparent 30%),
        radial-gradient(ellipse at 50% 70%, rgba(122, 92, 255, 0.16), transparent 35%);
      filter: blur(50px);
      animation: drift 12s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes drift {
      0% {
        transform: translate(-2%, -2%) scale(1);
      }
      100% {
        transform: translate(2%, 2%) scale(1.08);
      }
    }

    /* subtle stadium light beams */
    .beam {
      position: absolute;
      top: -20%;
      width: 40vw;
      height: 140vh;
      background: linear-gradient(to bottom, rgba(255,255,255,0.12), rgba(255,255,255,0));
      filter: blur(24px);
      transform: rotate(20deg);
      opacity: 0.25;
      z-index: 0;
      animation: sweep 7s ease-in-out infinite alternate;
    }

    .beam.left {
      left: -10%;
    }

    .beam.right {
      right: -10%;
      transform: rotate(-20deg);
      animation-delay: 1.5s;
    }

    @keyframes sweep {
      from {
        transform: translateX(0) rotate(20deg);
        opacity: 0.18;
      }
      to {
        transform: translateX(30px) rotate(25deg);
        opacity: 0.32;
      }
    }

    .loader-card {
      position: relative;
      z-index: 2;
      width: min(92%, 560px);
      padding: 42px 34px;
      border-radius: 28px;
      background: rgba(8, 15, 28, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        0 20px 60px rgba(0,0,0,0.45),
        inset 0 0 0 1px rgba(255,255,255,0.03);
      backdrop-filter: blur(16px);
      text-align: center;
    }

    .crest {
      width: 110px;
      height: 110px;
      margin: 0 auto 22px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 30%, rgba(0,255,170,0.9), rgba(0,130,255,0.8) 55%, rgba(8,15,28,0.8) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 30px rgba(0, 200, 255, 0.35),
        0 0 60px rgba(0, 255, 170, 0.2);
      border: 2px solid rgba(255,255,255,0.12);
      position: relative;
      overflow: hidden;
    }

    .crest::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.18);
    }

    .crest span {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 1px;
      color: white;
      text-shadow: 0 0 12px rgba(255,255,255,0.3);
      z-index: 1;
    }

    .title {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 800;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .title .accent {
      background: linear-gradient(90deg, #00f0b5, #46b8ff, #8f7dff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: rgba(255,255,255,0.72);
      font-size: 0.98rem;
      margin-bottom: 30px;
      letter-spacing: 0.5px;
    }

    .status {
      font-size: 1rem;
      font-weight: 600;
      color: rgba(255,255,255,0.92);
      margin-bottom: 14px;
    }

    .progress-wrap {
      width: 100%;
      height: 14px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #00f0b5, #39c4ff, #7a5cff);
      box-shadow: 0 0 18px rgba(0, 240, 181, 0.35);
      transition: width 0.12s linear;
    }

    .percent {
      font-size: 1.15rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 26px;
    }

    .mini-text {
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .pulse-dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      margin-left: 8px;
      border-radius: 50%;
      background: #00f0b5;
      box-shadow: 0 0 12px #00f0b5;
      animation: pulse 1.2s infinite;
      vertical-align: middle;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.4);
        opacity: 0.55;
      }
    }

    .footer-note {
      margin-top: 24px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.42);
    }

    @media (max-width: 600px) {
      .loader-card {
        padding: 34px 22px;
      }

      .crest {
        width: 92px;
        height: 92px;
      }
    }
  </style>
</head>
<body>
  <div class="aurora"></div>
  <div class="beam left"></div>
  <div class="beam right"></div>

  <div class="loader-card">
    <div class="crest">
      <span>AF</span>
    </div>

    <h1 class="title"><span class="accent">Aurora FC</span></h1>
    <p class="subtitle">Football Intelligence • Club HQ • Manager Dashboard</p>

    <div class="status" id="loadingText">
      Initialising Club Systems <span class="pulse-dot"></span>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="percent" id="percentText">0%</div>

    <div class="mini-text">Preparing Aurora Command Centre...</div>
    <div class="footer-note">Please wait while your dashboard loads</div>
  </div>

  <script>
    const progressBar = document.getElementById("progressBar");
    const percentText = document.getElementById("percentText");
    const loadingText = document.getElementById("loadingText");

    const loadingStages = [
      "Initialising Club Systems",
      "Loading Squad Data",
      "Syncing Transfer Centre",
      "Preparing Matchday Dashboard",
      "Entering Aurora HQ"
    ];

    let progress = 0;
    let stageIndex = 0;

    const interval = setInterval(() => {
      progress += Math.floor(Math.random() * 4) + 1;

      if (progress >= 100) {
        progress = 100;
      }

      if (progress > 20) stageIndex = 1;
      if (progress > 45) stageIndex = 2;
      if (progress > 70) stageIndex = 3;
      if (progress > 90) stageIndex = 4;

      progressBar.style.width = progress + "%";
      percentText.textContent = progress + "%";
      loadingText.innerHTML = `${loadingStages[stageIndex]} <span class="pulse-dot"></span>`;

      if (progress === 100) {
        clearInterval(interval);

        setTimeout(() => {
          // CHANGE THIS to your real dashboard page
          window.location.href = "dashboard.html";
        }, 800);
      }
    }, 90);
  </script>
</body>
</html>
